<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GX Bet - gxbet.ug</title>
    <style>
        :root { --sb-red: #E41A27; --sb-dark: #1B1E25; --sb-grey: #F4F4F4; --gold: #FFC107; }
        body { font-family: 'Roboto', Arial, sans-serif; margin: 0; background: var(--sb-grey); padding-bottom: 100px; }
        
        /* BIG G LOGO STYLE */
        header { 
            background: var(--sb-red); 
            color: white; 
            padding: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        .logo { font-weight: 900; font-size: 26px; display: flex; align-items: center; letter-spacing: -1px; }
        
        /* THE BIG G ICON */
        .logo-icon { 
            background: white; 
            color: var(--sb-red); 
            width: 45px; /* Way bigger */
            height: 45px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-right: 12px; 
            font-size: 32px; /* Bigger font inside */
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        
        /* Stats & Nav */
        .top-stats { background: #CC1622; font-size: 13px; padding: 8px 15px; display: flex; justify-content: space-between; color: white; font-weight: bold; }
        nav { background: var(--sb-dark); display: flex; overflow-x: auto; white-space: nowrap; }
        nav a { color: #9CA0AB; text-decoration: none; padding: 15px 20px; font-size: 14px; font-weight: bold; }
        nav a.active { color: white; border-bottom: 4px solid var(--gold); }

        /* Game Cards */
        .content { padding: 10px; }
        .match-card { background: white; border-radius: 8px; padding: 15px; margin-bottom: 10px; border: 1px solid #ddd; }
        .league { font-size: 11px; color: #888; margin-bottom: 5px; font-weight: bold; }
        .teams { display: flex; justify-content: space-between; font-weight: bold; font-size: 16px; margin-bottom: 15px; }
        
        /* Odds Styling */
        .odds-row { display: flex; gap: 8px; }
        .odd-box { 
            flex: 1; 
            background: #F1F1F1; 
            border: 1px solid #ddd; 
            padding: 12px 5px; 
            text-align: center; 
            border-radius: 6px; 
            cursor: pointer;
        }
        .odd-box:active { background: #ffebee; border-color: var(--sb-red); }
        .o-val { color: var(--sb-red); font-weight: 900; font-size: 15px; display: block; }
        .o-type { font-size: 11px; color: #666; }

        /* FLOATING BETSLIP */
        #betslip-bar { 
            position: fixed; 
            bottom: 60px; 
            left: 5%; 
            width: 90%; 
            background: var(--sb-dark); 
            color: white; 
            padding: 12px; 
            border-radius: 10px; 
            display: none; /* Hidden by default */
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.3);
            z-index: 2000;
        }

        /* Bottom Menu */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; padding: 10px 0; }
        .nav-item { flex: 1; text-align: center; font-size: 12px; color: #666; text-decoration: none; font-weight: bold; }
        .nav-item.active { color: var(--sb-red); }
    </style>
</head>
<body>

<header>
    <div class="logo"><div class="logo-icon">G</div> GX BET</div>
    <div style="display:flex; gap:8px;">
        <button onclick="deposit()" style="background:var(--gold); border:none; padding:8px 15px; border-radius:5px; font-weight:bold; font-size:13px;">DEPOSIT</button>
    </div>
</header>

<div class="top-stats">
    <span id="balDisplay">Balance: UGX 0</span>
    <span>gxbet.ug</span>
</div>

<nav>
    <a href="#" class="active">Football</a>
    <a href="#">Live Now</a>
    <a href="#">Basketball</a>
    <a href="#">Virtuals</a>
</nav>

<div class="content" id="gameList">
    </div>

<div id="betslip-bar">
    <div id="selection-info">1 Selection Selected</div>
    <button onclick="alert('Proceeding to Checkout...')" style="background:var(--gold); border:none; padding:8px 15px; border-radius:5px; font-weight:bold;">VIEW SLIP</button>
</div>

<div class="bottom-nav">
    <a href="#" class="nav-item active">🏠<br>Home</a>
    <a href="#" class="nav-item">⚽<br>Sports</a>
    <a href="#" class="nav-item">🧾<br>Betslip</a>
    <a href="#" class="nav-item">👤<br>Me</a>
</div>

<script>
    // List of Matches
    const games = [
        { league: "Premier League", t1: "Arsenal", t2: "Chelsea", o1: "1.95", ox: "3.40", o2: "4.10" },
        { league: "Premier League", t1: "Man City", t2: "Liverpool", o1: "2.10", ox: "3.60", o2: "2.80" },
        { league: "Uganda Premier League", t1: "Vipers SC", t2: "KCCA", o1: "1.75", ox: "3.10", o2: "4.50" },
        { league: "La Liga", t1: "Real Madrid", t2: "Barcelona", o1: "2.05", ox: "3.50", o2: "3.20" },
        { league: "Serie A", t1: "Inter Milan", t2: "AC Milan", o1: "2.30", ox: "3.20", o2: "3.00" }
    ];

    // Load Games into HTML
    function loadGames() {
        const container = document.getElementById('gameList');
        container.innerHTML = games.map(g => `
            <div class="match-card">
                <div class="league">${g.league}</div>
                <div class="teams"><span>${g.t1}</span> <span>vs</span> <span>${g.t2}</span></div>
                <div class="odds-row">
                    <div class="odd-box" onclick="addToSlip('${g.t1}', ${g.o1})"><span class="o-type">1</span><span class="o-val">${g.o1}</span></div>
                    <div class="odd-box" onclick="addToSlip('Draw', ${g.ox})"><span class="o-type">X</span><span class="o-val">${g.ox}</span></div>
                    <div class="odd-box" onclick="addToSlip('${g.t2}', ${g.o2})"><span class="o-type">2</span><span class="o-val">${g.o2}</span></div>
                </div>
            </div>
        `).join('');
    }

    // Betslip and Wallet Logic
    let selections = 0;
    let bal = localStorage.getItem('gx_bal') || 0;

    function addToSlip(team, odd) {
        selections++;
        document.getElementById('betslip-bar').style.display = 'flex';
        document.getElementById('selection-info').innerText = `${selections} Selection(s) Added`;
    }

    function deposit() {
        let amt = prompt("Enter Deposit Amount (UGX):", "10000");
        if(amt) { 
            bal = parseInt(bal) + parseInt(amt); 
            localStorage.setItem('gx_bal', bal); 
            updateUI(); 
        }
    }

    function updateUI() {
        document.getElementById('balDisplay').innerText = `Balance: UGX ${parseInt(bal).toLocaleString()}`;
    }

    // Run on startup
    loadGames();
    updateUI();
</script>

</body>
</html>
