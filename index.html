<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GX BET | Uganda's No.1</title>
    <style>
        :root { --red: #E41A27; --dark: #0b0b0b; --card: #1a1a1a; --gold: #ffbc00; --text: #efefef; }
        body { font-family: 'Helvetica Neue', sans-serif; margin: 0; background: var(--dark); color: var(--text); padding-bottom: 80px; }
        
        /* BIG G LOGO */
        header { background: var(--red); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 3000; }
        .logo-icon { background: white; color: var(--red); width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 45px; font-weight: 900; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        
        /* ALIVE ADS (Visual Backgrounds) */
        .ad-banner { 
            width: 100%; height: 160px; 
            background: url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=500') center/cover;
            position: relative; display: flex; align-items: flex-end; border-bottom: 3px solid var(--gold);
        }
        .ad-overlay { background: rgba(0,0,0,0.6); width: 100%; padding: 15px; box-sizing: border-box; }

        /* NAV SCROLLER */
        nav { background: #000; display: flex; overflow-x: auto; border-bottom: 1px solid #333; sticky; top: 85px; z-index: 2000; }
        nav button { background: none; border: none; color: #999; padding: 15px 20px; font-weight: bold; white-space: nowrap; font-size: 13px; }
        nav button.active { color: white; border-bottom: 3px solid var(--gold); }

        /* CONTENT */
        .page { display: none; padding: 10px; }
        .page.active { display: block; }
        .match-card { background: var(--card); border-radius: 6px; padding: 15px; margin-bottom: 10px; border: 1px solid #2a2a2a; }
        .league-tag { font-size: 10px; color: var(--gold); font-weight: bold; margin-bottom: 8px; }
        
        /* ODDS */
        .odds-row { display: flex; gap: 8px; margin-top: 10px; }
        .odd { flex: 1; background: #252525; padding: 12px; text-align: center; border-radius: 4px; border: 1px solid #333; cursor: pointer; }
        .odd:active { background: var(--red); }
        .odd b { color: var(--gold); font-size: 15px; display: block; }

        /* GX CASINO GRID */
        .casino-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .casino-game { background: linear-gradient(145deg, #1a1a1a, #000); border: 1px solid #333; border-radius: 10px; height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; text-align: center; }
        .game-icon { font-size: 28px; margin-bottom: 8px; }

        /* BETSLIP OVERLAY */
        #slip-modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 80%; background: #111; z-index: 4000; transition: 0.4s; border-radius: 20px 20px 0 0; padding: 20px; box-sizing: border-box; }
        #slip-modal.open { bottom: 0; }
        .slip-row { background: #222; padding: 10px; border-radius: 5px; margin-bottom: 10px; display: flex; justify-content: space-between; }

        /* BOTTOM NAV */
        .footer-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; padding: 12px 0; border-top: 1px solid #222; z-index: 3500; }
        .f-item { flex: 1; text-align: center; font-size: 11px; color: #777; font-weight: bold; }
        .f-item.active { color: var(--red); }
    </style>
</head>
<body>

<header>
    <div class="logo-icon">G</div>
    <div style="font-weight: 900; font-size: 22px;">GX BET</div>
    <button onclick="switchTab('profile')" style="background:var(--gold); border:none; padding:8px 15px; border-radius:5px; font-weight:bold;">LOGIN</button>
</header>

<div class="ad-banner">
    <div class="ad-overlay">
        <h3 style="margin:0; color:var(--gold)">🏆 EL CLÁSICO BOOST</h3>
        <p style="margin:5px 0; font-size:12px;">Real Madrid vs Barcelona - Odds 10.0 ON DRAW!</p>
    </div>
</div>

<nav>
    <button class="active" onclick="showCat('football', this)">Football</button>
    <button onclick="showCat('basketball', this)">Basketball</button>
    <button onclick="showCat('tennis', this)">Tennis</button>
    <button onclick="showCat('casino', this)">GX Casino</button>
</nav>

<div id="page-main" class="page active">
    <div id="list-container"></div>
</div>

<div id="page-profile" class="page">
    <div style="text-align:center; padding:40px 0;">
        <h2>Register Account</h2>
        <input type="tel" placeholder="Phone Number" style="width:80%; padding:15px; margin:10px; background:#222; border:1px solid #444; color:white;">
        <button style="width:80%; background:var(--red); color:white; padding:15px; border:none; font-weight:bold;">JOIN NOW</button>
    </div>
</div>

<div id="slip-modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="margin:0; color:var(--red)">My Betslip</h2>
        <button onclick="closeSlip()" style="color:white; background:none; border:none; font-size:24px;">✕</button>
    </div>
    <div id="slip-list"></div>
    <div style="position:absolute; bottom:20px; left:20px; right:20px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span>Total Odds</span> <b id="total-odds" style="color:var(--gold)">1.00</b>
        </div>
        <button onclick="alert('Bet Placed!')" style="width:100%; background:var(--red); color:white; padding:15px; border:none; font-weight:bold; border-radius:5px;">PLACE BET</button>
    </div>
</div>

<div class="footer-nav">
    <div class="f-item active" onclick="switchTab('main')">🏠<br>Home</div>
    <div class="f-item" onclick="openSlip()">🧾<br>Slip (<span id="s-count">0</span>)</div>
    <div class="f-item" onclick="switchTab('profile')">👤<br>Me</div>
</div>

<script>
    let mySelections = [];

    const db = {
        football: [
            { league: "Premier League", t1: "Man City", t2: "Liverpool", o1: 2.10, ox: 3.50, o2: 3.20 },
            { league: "Uganda PL", t1: "Vipers SC", t2: "KCCA FC", o1: 1.85, ox: 3.10, o2: 4.50 },
            { league: "La Liga", t1: "Real Madrid", t2: "Barcelona", o1: 2.20, ox: 3.40, o2: 2.90 }
        ],
        basketball: [
            { league: "NBA", t1: "LA Lakers", t2: "GS Warriors", o1: 1.90, ox: "-", o2: 1.95 },
            { league: "EuroLeague", t1: "Real Madrid BC", t2: "Monaco", o1: 1.50, ox: "-", o2: 2.40 }
        ],
        tennis: [
            { league: "ATP Miami", t1: "N. Djokovic", t2: "C. Alcaraz", o1: 1.75, ox: "-", o2: 2.15 }
        ],
        casino: [
            { name: "Aviator", icon: "🚀", color: "#e41a27" },
            { name: "Mines", icon: "💣", color: "#ffbc00" },
            { name: "Chicken", icon: "🐔", color: "#4caf50" },
            { name: "Penalty Shootout", icon: "⚽", color: "#2196f3" },
            { name: "Plinko", icon: "🎾", color: "#9c27b0" },
            { name: "Fruit Spin", icon: "🍋", color: "#ff9800" },
            { name: "Mega Wheel", icon: "🎡", color: "#f44336" },
            { name: "Blackjack", icon: "🃏", color: "#607d8b" },
            { name: "Lucky 7", icon: "🎰", color: "#795548" },
            { name: "Sugar Rush", icon: "🍬", color: "#e91e63" }
        ]
    };

    function showCat(cat, btn) {
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const container = document.getElementById('list-container');
        container.innerHTML = "";

        if(cat === 'casino') {
            let grid = '<div class="casino-grid">';
            // Repeat to make 100
            for(let i=0; i<100; i++) {
                let game = db.casino[i % db.casino.length];
                grid += `<div class="casino-game"><span class="game-icon">${game.icon}</span><b>${game.name} ${i+1}</b></div>`;
            }
            grid += '</div>';
            container.innerHTML = grid;
        } else {
            db[cat].forEach(m => {
                container.innerHTML += `
                <div class="match-card">
                    <div class="league-tag">${m.league}</div>
                    <div style="display:flex; justify-content:space-between; font-weight:bold;">
                        <span>${m.t1}</span> <span>vs</span> <span>${m.t2}</span>
                    </div>
                    <div class="odds-row">
                        <div class="odd" onclick="pick('${m.t1}', ${m.o1})"><b>${m.o1}</b><small>1</small></div>
                        ${m.ox !== "-" ? `<div class="odd" onclick="pick('Draw', ${m.ox})"><b>${m.ox}</b><small>X</small></div>` : ''}
                        <div class="odd" onclick="pick('${m.t2}', ${m.o2})"><b>${m.o2}</b><small>2</small></div>
                    </div>
                </div>`;
            });
        }
    }

    function pick(team, odd) {
        mySelections.push({ team, odd });
        document.getElementById('s-count').innerText = mySelections.length;
        alert("Added: " + team);
    }

    function openSlip() {
        const list = document.getElementById('slip-list');
        list.innerHTML = mySelections.map((s, i) => `
            <div class="slip-row">
                <span>${s.team}</span>
                <b style="color:var(--gold)">${s.odd}</b>
                <span onclick="removeBet(${i})" style="color:red">✕</span>
            </div>
        `).join('');
        let total = mySelections.reduce((a, b) => a * b.odd, 1).toFixed(2);
        document.getElementById('total-odds').innerText = total;
        document.getElementById('slip-modal').classList.add('open');
    }

    function closeSlip() { document.getElementById('slip-modal').classList.remove('open'); }
    function removeBet(i) { mySelections.splice(i, 1); openSlip(); document.getElementById('s-count').innerText = mySelections.length; }
    
    function switchTab(t) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + t).classList.add('active');
    }

    // Init
    showCat('football', document.querySelector('nav button'));
</script>
</body>
</html>
